services:
  tsdnsrv:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.25.1}
    image: tsdnsrv:local
    container_name: tsdnsrv
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./examples/basic:/config:ro
      - tsdnsrv-state:/config/state
    command: ["--config=/config/config.json"]
volumes:
  tsdnsrv-state:
